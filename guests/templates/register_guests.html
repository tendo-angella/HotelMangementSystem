{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">New Guest Registration</h5>
        </div>
        <div class="card-body">
            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-3">
                    <button type="submit" class="btn btn-success w-100">Save Guest Profile</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
