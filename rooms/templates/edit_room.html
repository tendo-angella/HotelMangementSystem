{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Edit Room: {{ room.room_number }}</h3>
        <hr>
        <form method="POST" novalidate>
            {% csrf_token %}
            
            {{ form|crispy }}

            <div class="mt-4">
                <button type="submit" class="btn btn-warning">Update Room</button>
                <a href="{% url 'rooms_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
